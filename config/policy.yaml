# ══════════════════════════════════════════════════════════════
# 公司财务制度（审计判定依据）
# 本文件内容会注入大模型，作为费用审计的判定标准——审计结论必须引用
# 本制度的具体条款，而非模型的主观判断。数值均为示例默认值，
# 请按贵司实际报销制度修改后生效（改完即时生效，无需重启）。
# ══════════════════════════════════════════════════════════════
policy:
  version: "v1.0 (2026-07)"
  currency: "人民币 (CNY)"

  reimbursement:
    # 单笔限额（元）：超限即判定为异常，需升级审批
    single_limits:
      业务招待费: 3000
      差旅费: 5000
      交通费: 1500
      办公用品: 2000
      技术培训费: 5000
    # 同一报销人、同一类目的月度累计限额（元）
    monthly_person_limits:
      业务招待费: 5000
    # 超过该金额的报销必须附发票/消费清单/事由说明
    evidence_required_above: 1000
    # 备注/事由中出现以下关键词，直接标记高风险
    sensitive_keywords:
      - KTV
      - 娱乐
      - 洗浴
      - 高尔夫
      - 礼品卡
      - 购物卡
    # 拆单判定规则
    split_detection: "同一报销人同月同类目出现多笔、且累计金额超过该类目单笔限额时，判定为疑似拆单规避审批"

  tax:
    # 企业所得税税率（一般企业 25%；高新技术企业请改为 0.15）
    corporate_income_tax_rate: 0.25
    # 业务招待费税前扣除规则（企业所得税法实施条例第四十三条）
    entertainment_deduction: "业务招待费按发生额的 60% 与当年营业收入的 5‰ 孰低者税前扣除，超出部分需纳税调增"

  principles:
    - "制度未覆盖的情形，仅提示风险，不下定性结论"
    - "税额估算必须注明所依据的税率条款；制度未提供依据时回答'无法估算'"
